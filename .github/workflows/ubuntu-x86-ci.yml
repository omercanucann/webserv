name: Ubuntu x86_64 CI

on:
  push:
    branches: [ main, master ]
  pull_request:
  workflow_dispatch:
    inputs:
      run_stress:
        description: "Run heavy POST stress test"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  build-and-test:
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    env:
      CONFIG_FILE: configs/default.conf
      PORT: 8080

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check runner architecture
        run: |
          uname -a
          uname -m
          test "$(uname -m)" = "x86_64"

      - name: Build project
        run: |
          make fclean
          make
          file ./webserv
          file ./webserv | grep -E "x86-64|x86_64"

      - name: Start webserv
        run: |
          nohup ./webserv "$CONFIG_FILE" > server.log 2>&1 &
          echo $! > server.pid
          sleep 2

          if ! kill -0 $(cat server.pid) 2>/dev/null; then
            echo "Server did not start"
            cat server.log
            exit 1
          fi

      - name: Basic GET test
        run: |
          curl -i --max-time 5 "http://127.0.0.1:${PORT}/"

      - name: Heavy POST stress test
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_stress == 'true' }}
        run: |
          dd if=/dev/zero of=/tmp/body.bin bs=1M count=100

          seq 1 100 | xargs -I{} -P 20 curl -sS \
            --max-time 180 \
            -X POST "http://127.0.0.1:${PORT}/directory/youpi.bla" \
            --data-binary @/tmp/body.bin \
            -o /dev/null

      - name: Stop server
        if: always()
        run: |
          if [ -f server.pid ]; then
            kill $(cat server.pid) 2>/dev/null || true
          fi

      - name: Show server log on failure
        if: failure()
        run: |
          cat server.log || true