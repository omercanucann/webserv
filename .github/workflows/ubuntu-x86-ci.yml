name: Make and Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  make-and-test:
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check architecture
        run: |
          uname -a
          uname -m
          test "$(uname -m)" = "x86_64"

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential netcat-openbsd

      - name: Build with make
        run: |
          make fclean
          make

      - name: Check binaries
        run: |
          ls -la
          file ./webserv
          file ./tester
          chmod +x ./tester
          if [ -f ./cgi_tester ]; then chmod +x ./cgi_tester; fi

      - name: Start webserv
        run: |
          nohup ./webserv configs/default.conf > server_output.txt 2>&1 &
          echo $! > server.pid

          echo "Waiting for webserv to start on port 8080..."
          for i in {1..15}; do
            if nc -z 127.0.0.1 8080; then
              echo "webserv is up and listening on port 8080."
              exit 0
            fi
            sleep 1
          done

          echo "::error::webserv did not start listening on port 8080 within 15 seconds."
          echo "----- server_output.txt -----"
          cat server_output.txt || true
          exit 1

      - name: Run tester
        run: |
          set +e
          timeout 50m ./tester http://127.0.0.1:8080 > tester_output.txt 2>&1
          TEST_EXIT_CODE=$?
          set -e

          echo "----- tester_output.txt -----"
          cat tester_output.txt || true

          exit $TEST_EXIT_CODE

      - name: Stop webserv
        if: always()
        run: |
          if [ -f server.pid ]; then
            kill "$(cat server.pid)" 2>/dev/null || true
          fi

      - name: Upload debug artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: webserv-test-logs
          path: |
            server_output.txt
            tester_output.txt
          if-no-files-found: ignore
          retention-days: 1